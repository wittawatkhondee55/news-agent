name: news-agent

# ดึงข่าว -> วิเคราะห์ -> แจ้งเตือน Telegram ตามรอบ
# repo root = โฟลเดอร์นี้ (news-agent/) ดังนั้นไฟล์ทั้งหมดอยู่ที่ root ไม่มี subdir
on:
  schedule:
    # ทุก 5 นาที — เป็นไปได้เพราะ repo เป็น public (Actions ฟรีไม่จำกัด)
    # dedup กันข่าวซ้ำ จึงจ่าย API เฉพาะข่าวใหม่ ไม่ขึ้นกับความถี่ที่เช็ค
    # Opus-upgrade ช่วงข่าวสำคัญยังทำงานในโค้ด (events.json) — ไม่ต้องใช้ run-fast แล้ว
    - cron: "*/5 * * * *"
  workflow_dispatch:      # ปุ่มรัน manual + กำหนดจำนวนข่าวได้ (ทดสอบ)
    inputs:
      max_per_run:
        description: "จำนวนข่าวสูงสุดต่อรอบ (เว้นว่าง = ค่าเริ่มต้น 20)"
        required: false
        default: ""

# ต้องมีสิทธิ์เขียน เพื่อ commit processed_news.json กลับ (ให้ dedupe จำข้ามรอบ)
permissions:
  contents: write

concurrency:
  group: news-agent
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
          MAX_PER_RUN: ${{ github.event.inputs.max_per_run }}
        run: python main.py

      - name: Persist processed_news.json
        run: |
          if ! git diff --quiet processed_news.json; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add processed_news.json
            git commit -m "chore: update processed_news.json [skip ci]"
            git push
          else
            echo "processed_news.json ไม่เปลี่ยน — ไม่ต้อง commit"
          fi
